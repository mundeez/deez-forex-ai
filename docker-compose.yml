version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: deez-forex-postgres
    environment:
      POSTGRES_USER: forex
      POSTGRES_PASSWORD: forex_secret
      POSTGRES_DB: deez_forex
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex -d deez_forex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deez-forex-redis
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://forex:forex_secret@postgres:5432/deez_forex
      REDIS_URL: redis://redis:6379/0
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
    ports:
      - "28000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-celery
    environment:
      DATABASE_URL: postgresql+asyncpg://forex:forex_secret@postgres:5432/deez_forex
      REDIS_URL: redis://redis:6379/0
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://forex:forex_secret@postgres:5432/deez_forex
      REDIS_URL: redis://redis:6379/0
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deez-forex-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "23000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
