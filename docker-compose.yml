version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: deez-forex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-deez_forex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forex} -d ${POSTGRES_DB:-deez_forex}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deez-forex-redis
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: deez-forex-qdrant
    ports:
      - "26333:6333"
      - "26334:6334"
    volumes:
      - qdrant_data:/qdrant/storage


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forex}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-deez_forex}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,https://fx.deeztechnology.solutions}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "28000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-celery
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --destination '*@*' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forex}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-deez_forex}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,https://fx.deeztechnology.solutions}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: celery -A app.celery_app worker --pool=threads --loglevel=info

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deez-forex-beat
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --destination '*@*' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forex}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-deez_forex}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      META_API_TOKEN: ${META_API_TOKEN:-}
      META_API_ACCOUNT_ID: ${META_API_ACCOUNT_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: ${DATA_PROVIDER:-metaapi}
      MT5_ZMQ_HOST: ${MT5_ZMQ_HOST:-host.docker.internal}
      MT5_ZMQ_REQ_PORT: ${MT5_ZMQ_REQ_PORT:-5555}
      MT5_ZMQ_PUB_PORT: ${MT5_ZMQ_PUB_PORT:-5556}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,https://fx.deeztechnology.solutions}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: celery -A app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deez-forex-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://fx.deeztechnology.solutions
    ports:
      - "23000:3000"
    depends_on:
      - backend
    command: npm start

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
